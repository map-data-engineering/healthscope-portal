project:
  type: website
  output-dir: docs
  resources:
    - images/
    - etl/data/processed/country_standardized/*.csv

website:
  title: "HealthScope"
  site-url: https://map-data-engineering.github.io/healthscope-portal
  back-to-top-navigation: true

  page-footer:
    left: |
      &copy; 2026 HealthScope &mdash; Malaria Atlas Project, Dar es Salaam Node

      Open health facility intelligence for Sub-Saharan Africa
    background: "#3d3d3d"
    foreground: light
    border: false

  navbar:
    pinned: true
    search: true
    title: "HealthScope"
    logo-href: /index.html
    background: "#3d3d3d"

    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Registry Explorer"
        href: registry.qmd
      - text: "General Information"
        href: equity.qmd
      - text: "Service Intelligence"
        href: services.qmd
      - text: "Find Facility"
        href: find-facility.qmd
      - text: "Help"
        href: help.qmd

format:
  html:
    theme:
      light: [cosmo, style-base.scss, style-light.scss]
      dark: [darkly, style-base.scss, style-dark.scss]
    toc: false
    link-external-icon: true
    link-external-newwindow: true
    smooth-scroll: true
    grid:
      body-width: 1400px
      sidebar-width: 0px
      margin-width: 0px

execute:
  freeze: auto
